name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build HACS zip
        run: |
          (cd custom_components && zip -rq ../washreminder.zip washreminder \
            -x "*__pycache__/*" -x "*.pyc" -x "*/.DS_Store")
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: washreminder.zip
          # Tag must match manifest.json version without the v prefix.
          # To release: git tag v1.0.0 && git push origin v1.0.0
