name: Release

on:
  push:
    tags:
      # Matches v1.2.0, v1.2.0b0, v1.2.0rc1, etc. (manifest version + optional v prefix)
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inject version from tag into manifest.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' \
            custom_components/washreminder/manifest.json > tmp.json \
            && mv tmp.json custom_components/washreminder/manifest.json
      - name: Build HACS zip
        run: |
          (cd custom_components/washreminder && zip -rq ../../washreminder.zip . \
            -x "*__pycache__/*" -x "*.pyc" -x "*/.DS_Store")
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: washreminder.zip
          # Mark beta/rc tags as GitHub pre-releases so HACS can offer them when "Show beta versions" is on.
          prerelease: ${{ contains(github.ref_name, 'b') || contains(github.ref_name, 'rc') }}
          # Version is derived from the git tag automatically.
          # Stable: git tag v1.2.0 && git push origin v1.2.0
          # Beta:   git tag v1.2.0b0 && git push origin v1.2.0b0
